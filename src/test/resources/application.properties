# ─────────────────────────────────────────────────────────
# Used ONLY when mvn test runs
# H2 in-memory replaces MySQL — MySQL is NEVER touched
# ─────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 creates tables from @Entity automatically
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# H2 console — open browser to inspect records during debug
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.example.employee=DEBUG
